    .header-logo { font-size: 28px; font-weight: 900; color: #fff; letter-spacing: -1px; font-style: italic; }

    .header-title { font-size: 18px; font-weight: 800; color: #fff; text-transform: uppercase; letter-spacing: -.2px; }

    .header-right { margin-left: auto; text-align: right; }
    .header-badge {
      display: inline-block; padding: 3px 10px; border-radius: 3px;
      font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: .5px;
      background: #fff; color: var(--espn);
    }
    .header-date { font-size: 11px; color: rgba(255,255,255,.7); margin-top: 4px; }

    .container { max-width: 1340px; margin: 0 auto; padding: 20px 16px; }
    .section { margin-bottom: 28px; }

      display: flex; align-items: center; gap: 8px;
      margin-bottom: 12px; padding-bottom: 8px;
      border-bottom: 2px solid var(--espn);
    }
    .section-title { font-size: 14px; font-weight: 800; text-transform: uppercase; letter-spacing: .3px; }

      font-size: 10px; background: var(--card2); color: var(--text2);

    .lb-table { width: 100%; border-collapse: collapse; background: var(--card); white-space: nowrap; }

      border-bottom: 1px solid var(--border); text-align: left;

    .lb-table td { padding: 9px 12px; border-bottom: 1px solid var(--border); vertical-align: middle; }
    .lb-table tr:last-child td { border-bottom: none; }
    .lb-table tr:hover td { background: #fafafa; }
    .rank { font-size: 13px; font-weight: 800; min-width: 28px; display: inline-block; text-align: center; }

    .rank-other { color: var(--text2); font-weight: 400; }
    .player-name { font-weight: 700; font-size: 13px; }

    .score-part { font-size: 11px; color: var(--text2); }
    .champ-tag { display: inline-block; padding: 2px 8px; border-radius: 3px; font-size: 11px; font-weight: 600; }
    .champ-alive  { background: var(--gold-bg); color: var(--gold); border: 1px solid rgba(176,122,0,.25); }

    .tab-btn {

    .tab-btn.active { color: var(--espn); border-bottom-color: var(--espn); }
    .tab-pane { display: none; padding-top: 14px; }

/* ================================================================
   SCORING ENGINE
================================================================ */
function calcScores(p) {
  const S32 = new Set(RESULTS.r32);
  const S16 = new Set(RESULTS.r16);
  const SQF = new Set(RESULTS.qf);

  const r32 = p.r32.reduce((n,t) => n + (S32.has(t) ? SCORING.r32 : 0), 0);
  const r16 = p.r16.reduce((n,t) => n + (S16.has(t) ? SCORING.r16 : 0), 0);
  const qf  = p.qf .reduce((n,t) => n + (SQF.has(t) ? SCORING.qf  : 0), 0);

  let fin = 0;
  const F = RESULTS.final;
  if (F.fourth   && p.final.fourth   === F.fourth)   fin += SCORING.final_4th;
  if (F.third    && p.final.third    === F.third)     fin += SCORING.final_3rd;
  if (F.second   && p.final.second   === F.second)    fin += SCORING.final_2nd;
  if (F.champion && p.final.champion === F.champion)  fin += SCORING.final_champion;

  return { gs: p.gs, r32, r16, qf, final: fin, total: p.gs + r32 + r16 + qf + fin };
}

/* ── อันดับที่ของทีมที่ผู้เล่นทายแชมป์ ── */
function champStatus(team) {
  const F = RESULTS.final;
  if (F.champion === team) return 'win';

  const S32out = new Set(RESULTS.r32_out);
  const S16out = new Set(RESULTS.r16_out);
  const SQFout = new Set(RESULTS.qf_out);

  if (S32out.has(team) || S16out.has(team) || SQFout.has(team)) return 'out';
  return 'alive';
}

/* ── สีของ pick ในตาราง ── */
function pickColor(team, advSet, outSet) {
  if (advSet.has(team)) return 'p-correct';
  if (outSet.has(team)) return 'p-wrong';
  return 'p-pending';
}

/* ── จัดอันดับ ── */
function ranked() {
  const list = PLAYERS.map(p => ({ ...p, scores: calcScores(p) }));
  list.sort((a,b) => b.scores.total - a.scores.total);
  let rank = 1;
  for (let i = 0; i < list.length; i++) {
    if (i > 0 && list[i].scores.total < list[i-1].scores.total) rank = i + 1;
    list[i].rank = rank;
  }
  return list;
}

      <div class="header-sub">${PLAYERS.length} ผู้เล่น · คะแนนเต็ม ${SCORING.max} pts</div>

  <div class="container">

    <div class="stats-row">
      <div class="stat-card">
        <div class="stat-label">ผู้นำตาราง</div>
        <div class="stat-value" style="font-size:17px">${leader.name}</div>
        <div class="stat-sub">${leader.scores.total} pts</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">ผ่าน R32 แล้ว</div>
        <div class="stat-value">${r32done}<span style="font-size:14px;color:var(--text2)">/16</span></div>
        <div class="stat-sub">เหลือ ${16-r32done} ทีม</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">ผ่าน R16 แล้ว</div>
        <div class="stat-value">${r16done}<span style="font-size:14px;color:var(--text2)">/8</span></div>
        <div class="stat-sub">${r16done===0?'ยังไม่เริ่ม':'เหลือ '+(8-r16done)+' ทีม'}</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">ผ่าน QF แล้ว</div>
        <div class="stat-value">${qfdone}<span style="font-size:14px;color:var(--text2)">/4</span></div>
        <div class="stat-sub">${qfdone===0?'ยังไม่เริ่ม':'เหลือ '+(4-qfdone)+' ทีม'}</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">คะแนนสูงสุดปัจจุบัน</div>
        <div class="stat-value">${leader.scores.total}</div>
        <div class="stat-sub">จากเต็ม ${SCORING.max} pts</div>
      </div>
    </div>

    <!-- LEADERBOARD -->
    <div class="section">
      <div class="section-header">
        <span class="section-title">🏆 ตารางคะแนน</span>
        <span class="section-badge">อัพเดทอัตโนมัติ</span>
      </div>
      <div class="lb-wrap">
        <table class="lb-table">
          <thead><tr>
            <th style="width:40px">#</th>
            <th>ผู้เล่น</th>
            <th class="num">GS<br/><small style="font-weight:400">รอบแบ่งกลุ่ม</small></th>
            <th class="num">R32<br/><small style="font-weight:400">5pt/ทีม</small></th>
            <th class="num">R16<br/><small style="font-weight:400">10pt/ทีม</small></th>
            <th class="num">QF<br/><small style="font-weight:400">20pt/ทีม</small></th>
            <th class="num">Final<br/><small style="font-weight:400">max 140pt</small></th>
            <th class="num" style="color:var(--espn)">รวม</th>
            <th>ทายแชมป์</th>
            <th>Progress</th>
          </tr></thead>
          <tbody>
            ${players.map(p => {
              const s = p.scores;
              const rCls = p.rank<=3 ? `rank-${p.rank}` : 'rank-other';
              const rIcon = p.rank===1?'🥇':p.rank===2?'🥈':p.rank===3?'🥉':'';
              const cs = champStatus(p.final.champion);
              const champCls = cs==='win'?'champ-win':cs==='out'?'champ-out':'champ-alive';
              const champSuffix = cs==='win'?' 🏆':cs==='out'?' ✗':'';
              const pct = Math.round(s.total/SCORING.max*100);
              return `<tr>
                <td><span class="rank ${rCls}">${rIcon||p.rank}</span></td>
                <td><span class="player-name">${p.name}</span></td>
                <td class="num score-part">${s.gs}</td>
                <td class="num score-part">${s.r32}</td>

                <td class="num score-part">${s.qf}</td>
                <td class="num score-part">${s.final}</td>

                <td>
                  <div class="progress-bar-wrap">
                    <div class="pbar"><div class="pbar-fill" style="width:${pct}%"></div></div>
                    <span style="font-size:10px;color:var(--text2)">${pct}%</span>
                  </div>
                </td>

            }).join('')}

        </table>

    </div>

    <!-- PICKS DETAIL TABS -->
    <div class="section">
      <div class="section-header">
        <span class="section-title">📋 รายละเอียดการทาย</span>

      <div class="tabs">
        <button class="tab-btn active" onclick="switchTab('r32',this)">R32 — รอบ 16 ทีม</button>
        <button class="tab-btn" onclick="switchTab('r16',this)">R16 — รอบ 8 ทีม</button>
        <button class="tab-btn" onclick="switchTab('qf',this)">QF — รอบรองฯ</button>
        <button class="tab-btn" onclick="switchTab('final',this)">Final — ชิงชนะเลิศ</button>
      </div>

      <div id="tab-r32" class="tab-pane active">${buildPicksTable(players,'r32',16,5)}</div>
      <div id="tab-r16" class="tab-pane">${buildPicksTable(players,'r16',8,10)}</div>
      <div id="tab-qf"  class="tab-pane">${buildPicksTable(players,'qf',4,20)}</div>

    <div class="legend">

      <div class="legend-item"><div class="ldot ldot-pending"></div> ยังไม่มีผล</div>
    </div>

    <div style="text-align:center;color:var(--text2);font-size:11px;padding:24px 0 8px">
      FIFA World Cup 2026 · Office Prediction Pool · คะแนนเต็ม ${SCORING.max} pts
    </div>
  </div>
  `;
}

/* ── Build picks table (r32 / r16 / qf) ── */
function buildPicksTable(players, round, maxTeams, pts) {
  const advSet = new Set(RESULTS[round]);
  const outSet = new Set(RESULTS[round + '_out']);
  const n = players[0][round].length;
  const doneCount = advSet.size + outSet.size;
  const roundComplete = advSet.size === maxTeams;

  // column headers: number + most popular pick
  const colCounts = Array.from({length:n}, (_,i) => {
    const cnt = {};
    players.forEach(p => { const t=p[round][i]; cnt[t]=(cnt[t]||0)+1; });
    const top = Object.entries(cnt).sort((a,b)=>b[1]-a[1])[0];
    return top ? top[0] : '?';
  });

  const thead = `<thead><tr>
    <th class="player-col">ผู้เล่น</th>
    ${colCounts.map((lbl,i) => {
      const won = advSet.has(lbl);
      return `<th title="Slot ${i+1}" style="${won?'color:var(--green)!important':''}">${i+1}<br/><small style="font-weight:400;font-size:9px">${lbl}</small></th>`;
    }).join('')}
    <th class="score-col">คะแนน<br/><small style="font-size:9px">${pts}pt×</small></th>
  </tr></thead>`;

  const tbody = players.map(p => {
    let earned = 0;
    const cells = p[round].map(team => {
      const cls = pickColor(team, advSet, outSet);
      if (cls === 'p-correct') earned += pts;
      return `<td class="${cls}">${team}</td>`;
    }).join('');
    return `<tr><td class="player-col">${p.name}</td>${cells}<td class="score-col">${earned}</td></tr>`;
  }).join('');

  const matchesPlayed = Math.max(advSet.size, outSet.size > 0 ? outSet.size : 0);
  const totalPlayed   = advSet.size; // teams advanced = matches played
  const statusLine = roundComplete
    ? `<span style="color:var(--green);font-weight:600">✓ รอบนี้จบแล้ว — ${maxTeams} ทีมผ่าน</span>`
    : `<span style="color:var(--text2)">ผ่านแล้ว ${advSet.size}/${maxTeams} ทีม · ตกรอบ ${outSet.size} ทีม</span>`;

  return `
    <div style="font-size:11px;margin-bottom:8px">${statusLine}</div>
    <div class="picks-wrap">
      <table class="picks-table">${thead}<tbody>${tbody}</tbody></table>
    </div>
    <div class="legend" style="margin-top:8px">
      <div class="legend-item"><div class="ldot ldot-correct"></div> ผ่านรอบ (+${pts} pts)</div>
      <div class="legend-item"><div class="ldot ldot-wrong"></div> ตกรอบ</div>
      <div class="legend-item"><div class="ldot ldot-pending"></div> รอผล</div>
    </div>`;
}

/* ── Build final table ── */
function buildFinalTable(players) {
  const keys = ['fourth','third','second','champion'];
  const labels = ['อันดับ 4','อันดับ 3','รองแชมป์','🏆 แชมป์'];
  const bonus  = [SCORING.final_4th, SCORING.final_3rd, SCORING.final_2nd, SCORING.final_champion];
  const F = RESULTS.final;

  const thead = `<thead><tr>
    <th class="player-col">ผู้เล่น</th>
    ${labels.map((lbl,i) => {
      const w = F[keys[i]];
      return `<th>${lbl}<br/><small style="font-weight:400;font-size:9px">${w?'✅ '+w:'รอผล'}</small><br/><small style="font-size:9px;color:var(--gold)">(+${bonus[i]}pt)</small></th>`;
    }).join('')}
    <th class="score-col">โบนัส</th>
  </tr></thead>`;

  const tbody = players.map(p => {
    let earned = 0;
    const cells = keys.map((k,i) => {
      const pick   = p.final[k] || '—';
      const winner = F[k];
      const cs     = champStatus(pick);
      const isDead = (k === 'champion') && cs === 'out';
      if (!winner) {
        return `<td class="p-pending">${isDead?`<span style="text-decoration:line-through;color:var(--red-txt)">${pick}</span>`:pick}</td>`;
      }
      const ok = pick === winner;
      if (ok) earned += bonus[i];
      return `<td class="${ok?'p-correct':'p-wrong'}">${pick}</td>`;
    }).join('');
    return `<tr><td class="player-col">${p.name}</td>${cells}<td class="score-col">${earned}</td></tr>`;
  }).join('');

  return `<div class="picks-wrap"><table class="picks-table">${thead}<tbody>${tbody}</tbody></table></div>
  <div class="legend" style="margin-top:8px">
    <div class="legend-item"><div class="ldot ldot-correct"></div> ถูก</div>
    <div class="legend-item"><div class="ldot ldot-wrong"></div> ผิด</div>
    <div class="legend-item"><div class="ldot ldot-pending"></div> รอผล</div>
    <div class="legend-item" style="color:var(--red-txt)">ขีดทับ = ทีมตกรอบแล้ว</div>
  </div>`;
}

/* ── Tab switch ── */
function switchTab(id, btn) {
  document.querySelectorAll('.tab-pane').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('tab-'+id).classList.add('active');
  btn.classList.add('active');
}

render();
</script>
