    .header {

    .header-icon { font-size: 32px; line-height: 1; }
    .header-title { font-size: 20px; font-weight: 900; color: #fff; letter-spacing: -.3px; text-transform: uppercase; }
    .header-sub { font-size: 12px; color: rgba(255,255,255,.75); margin-top: 3px; }
    .header-right { margin-left: auto; text-align: right; }
    .header-badge {
      display: inline-block; padding: 3px 10px; border-radius: 3px;
      font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: .5px;
      background: #fff; color: var(--espn-red); border: none;
    }
    .header-date { font-size: 11px; color: rgba(255,255,255,.7); margin-top: 4px; }

    .section-badge { font-size: 10px; background: var(--card2); color: var(--text2); padding: 2px 8px; border-radius: 10px; border: 1px solid var(--border); }

    .lb-table td { padding: 9px 12px; border-bottom: 1px solid var(--border); vertical-align: middle; }

    .lb-table tr:hover td { background: rgba(255,255,255,.04); }
    .lb-table thead tr { border-top: 2px solid var(--espn-red); }
    .rank { font-size: 13px; font-weight: 700; min-width: 28px; display: inline-block; text-align: center; }
    .rank-1 { color: #FFD700; } .rank-2 { color: #C0C0C0; } .rank-3 { color: #CD7F32; }
    .rank-other { color: var(--text2); }

    .score-total { font-weight: 700; font-size: 15px; }
    .score-part { font-size: 11px; color: var(--text2); }
    .champ-tag { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 11px; }
    .champ-alive { background: var(--gold-bg); color: #f0b429; border: 1px solid rgba(240,180,41,.3); }
    .champ-dead  { background: var(--red-bg);  color: var(--red-txt); border: 1px solid rgba(248,113,113,.3); text-decoration: line-through; }

    .tab-pane { display: none; padding-top: 14px; }
    .tab-pane.active { display: block; }

    .picks-table th.score-col { text-align: right; background: rgba(204,0,0,.08); color: var(--espn-red) !important; }

    .notice { background: var(--card); border: 1px solid var(--border); border-left: 3px solid var(--espn-red); padding: 10px 14px; border-radius: 6px; font-size: 12px; color: var(--text2); margin-top: 10px; }

/* ================================================================
   SCORING LOGIC
================================================================ */
function calcScores(p) {
  const r32 = RESULTS.r32.reduce((s,w,i)=> w && p.r32[i]===w ? s+SCORING.r32 : s, 0);
  const r16 = RESULTS.r16.reduce((s,w,i)=> w && p.r16[i]===w ? s+SCORING.r16 : s, 0);
  const qf  = RESULTS.qf .reduce((s,w,i)=> w && p.qf[i] ===w ? s+SCORING.qf  : s, 0);
  let fin = 0;
  const F = RESULTS.final;
  if (F.fourth   && p.final.fourth   === F.fourth)   fin += SCORING.final_4th;
  if (F.third    && p.final.third    === F.third)     fin += SCORING.final_3rd;
  if (F.second   && p.final.second   === F.second)    fin += SCORING.final_2nd;
  if (F.champion && p.final.champion === F.champion)  fin += SCORING.final_champion;
  const total = p.gs_score + r32 + r16 + qf + fin;
  return { gs: p.gs_score, r32, r16, qf, final: fin, total };
}

function isElim(team) { return RESULTS.eliminated.includes(team); }

function matchesDone(arr) { return arr.filter(x => x !== null).length; }

function ranked() {
  const list = PLAYERS.map(p => ({ ...p, scores: calcScores(p) }));
  list.sort((a,b) => b.scores.total - a.scores.total);
  let rank = 1;
  for (let i = 0; i < list.length; i++) {
    if (i > 0 && list[i].scores.total < list[i-1].scores.total) rank = i + 1;
    list[i].rank = rank;
  }
  return list;
}

/* ── Build picks table for r32/r16/qf ── */
function buildPicksTable(players, round) {
  const results = RESULTS[round];
  const labels  = LABELS[round];
  const pts     = SCORING[round];
  const n       = results.length;

  const thead = `<thead>
    <tr>
      <th class="player-col">ผู้เล่น</th>
      ${labels.map((lbl,i) => {
        const w = results[i];
        const cls = w ? 'match-known' : '';
        return `<th class="${cls}" title="${lbl}">${lbl}<br/><small style="font-size:9px;font-weight:400">${w ? '✅ '+w : '—'}</small></th>`;
      }).join('')}
      <th class="score-col">คะแนน<br/><small style="font-size:9px">${pts}pt×</small></th>
    </tr>
  </thead>`;

  const tbody = players.map(p => {
    const picks = p[round];
    let pts_earned = 0;
    const cells = results.map((winner, i) => {
      const pick = picks[i] || '—';
      if (!winner) return `<td class="p-pending">${pick}</td>`;
      const ok = pick === winner;
      if (ok) pts_earned += pts;
      return `<td class="${ok?'p-correct':'p-wrong'}">${pick}</td>`;
    }).join('');
    return `<tr>
      <td class="player-col">${p.name}</td>
      ${cells}
      <td class="score-col">${pts_earned}</td>
    </tr>`;
  }).join('');

  return `<div class="picks-wrap"><table class="picks-table">${thead}<tbody>${tbody}</tbody></table></div>
  <div class="legend" style="margin-top:8px">
    <div class="legend-item"><div class="ldot ldot-correct"></div> ถูก (+${pts} pts)</div>
    <div class="legend-item"><div class="ldot ldot-wrong"></div> ผิด</div>
    <div class="legend-item"><div class="ldot ldot-pending"></div> ยังไม่มีผล</div>
  </div>`;
}

/* ── Build final picks table ── */
function buildFinalTable(players) {
  const F = RESULTS.final;
  const keys = ['fourth','third','second','champion'];
  const bonus = [SCORING.final_4th, SCORING.final_3rd, SCORING.final_2nd, SCORING.final_champion];

  const thead = `<thead><tr>
    <th class="player-col">ผู้เล่น</th>
    ${LABELS.final.map((lbl,i) => {
      const w = F[keys[i]];
      return `<th class="${w?'match-known':''}">${lbl}<br/><small style="font-size:9px;font-weight:400">${w ? '✅ '+w : '—'}</small><br/><small style="font-size:9px;color:var(--gold)">(+${bonus[i]}pt)</small></th>`;
    }).join('')}
    <th class="score-col">โบนัส</th>
  </tr></thead>`;

  const tbody = players.map(p => {
    let earned = 0;
    const cells = keys.map((k,i) => {
      const pick = p.final[k] || '—';
      const winner = F[k];
      const dead = isElim(pick);
      if (!winner) {
        return `<td class="p-pending ${dead?'':''}"><span ${dead?'style="text-decoration:line-through;color:var(--red-txt)"':''}>${pick}</span></td>`;
      }
      const ok = pick === winner;
      if (ok) earned += bonus[i];
      return `<td class="${ok?'p-correct':'p-wrong'}">${pick}</td>`;
    }).join('');
    return `<tr><td class="player-col">${p.name}</td>${cells}<td class="score-col">${earned}</td></tr>`;
  }).join('');

  return `<div class="picks-wrap"><table class="picks-table">${thead}<tbody>${tbody}</tbody></table></div>
  <div class="legend" style="margin-top:8px">
    <div class="legend-item"><div class="ldot ldot-correct"></div> ถูก</div>
    <div class="legend-item"><div class="ldot ldot-wrong"></div> ผิด</div>
    <div class="legend-item"><div class="ldot ldot-pending"></div> ยังไม่มีผล</div>
    <div class="legend-item" style="color:var(--red-txt)">⚠️ ขีดทับ = ทีมตกรอบแล้ว</div>
  </div>`;
}

/* ── Tab switcher ── */
function switchTab(id, btn) {
  document.querySelectorAll('.tab-pane').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('tab-'+id).classList.add('active');
  btn.classList.add('active');
}
