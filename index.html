<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>GROUP1 - WC 2026 Prediction Pool</title>
  <style>
    :root {
      --bg: #f5f5f5; --card: #ffffff; --card2: #f0f0f0; --border: #e0e0e0;
      --text: #111111; --text2: #666666;
      --green: #007a2e; --green-bg: rgba(0,122,46,.10); --green-txt: #006626;
      --red-bg: rgba(204,0,0,.08); --red-txt: #cc0000;
      --gold: #b07a00; --gold-bg: rgba(176,122,0,.10);
      --espn: #cc0000;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: var(--bg); color: var(--text); font-family: 'Helvetica Neue',Arial,sans-serif; font-size: 13px; }

    /* ── HEADER ── */
    .header {
      background: var(--espn); padding: 14px 24px;
      display: flex; align-items: center; gap: 14px;
      border-bottom: 3px solid #aa0000;
    }
    .header-logo { font-size: 28px; font-weight: 900; color: #fff; letter-spacing: -1px; font-style: italic; }
    .header-divider { width: 2px; height: 32px; background: rgba(255,255,255,.4); }
    .header-title { font-size: 18px; font-weight: 800; color: #fff; text-transform: uppercase; letter-spacing: -.2px; }
    .header-sub { font-size: 11px; color: rgba(255,255,255,.75); margin-top: 3px; }
    .header-right { margin-left: auto; text-align: right; }
    .header-badge {
      display: inline-block; padding: 3px 10px; border-radius: 3px;
      font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: .5px;
      background: #fff; color: var(--espn);
    }
    .header-date { font-size: 11px; color: rgba(255,255,255,.7); margin-top: 4px; }

    /* ── LAYOUT ── */
    .container { max-width: 1340px; margin: 0 auto; padding: 20px 16px; }
    .section { margin-bottom: 28px; }
    .section-header {
      display: flex; align-items: center; gap: 8px;
      margin-bottom: 12px; padding-bottom: 8px;
      border-bottom: 2px solid var(--espn);
    }
    .section-title { font-size: 14px; font-weight: 800; text-transform: uppercase; letter-spacing: .3px; }
    .section-badge {
      font-size: 10px; background: var(--card2); color: var(--text2);
      padding: 2px 8px; border-radius: 10px; border: 1px solid var(--border);
    }

    /* ── STATS ROW ── */
    .stats-row { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 20px; }
    .stat-card {
      background: var(--card); border: 1px solid var(--border);
      border-top: 3px solid var(--espn);
      border-radius: 4px; padding: 12px 16px; flex: 1; min-width: 130px;
    }
    .stat-label { font-size: 10px; color: var(--text2); text-transform: uppercase; letter-spacing: .5px; font-weight: 600; }
    .stat-value { font-size: 22px; font-weight: 800; color: var(--text); margin-top: 4px; }
    .stat-sub { font-size: 11px; color: var(--text2); margin-top: 2px; }

    /* ── LEADERBOARD ── */
    .lb-wrap { overflow-x: auto; border: 1px solid var(--border); border-radius: 4px; }
    .lb-table { width: 100%; border-collapse: collapse; background: var(--card); white-space: nowrap; }
    .lb-table thead { border-top: 3px solid var(--espn); }
    .lb-table th {
      background: var(--card2); padding: 9px 12px;
      font-size: 10px; color: var(--text2); text-transform: uppercase;
      letter-spacing: .4px; font-weight: 700;
      border-bottom: 1px solid var(--border); text-align: left;
    }
    .lb-table th.num, .lb-table td.num { text-align: right; }
    .lb-table td { padding: 9px 12px; border-bottom: 1px solid var(--border); vertical-align: middle; }
    .lb-table tr:last-child td { border-bottom: none; }
    .lb-table tr:hover td { background: #fafafa; }
    .rank { font-size: 13px; font-weight: 800; min-width: 28px; display: inline-block; text-align: center; }
    .rank-1 { color: #B8860B; } .rank-2 { color: #888; } .rank-3 { color: #CD7F32; }
    .rank-other { color: var(--text2); font-weight: 400; }
    .player-name { font-weight: 700; font-size: 13px; }
    .score-total { font-weight: 800; font-size: 15px; color: var(--espn); }
    .score-part { font-size: 11px; color: var(--text2); }
    .champ-tag { display: inline-block; padding: 2px 8px; border-radius: 3px; font-size: 11px; font-weight: 600; }
    .champ-alive  { background: var(--gold-bg); color: var(--gold); border: 1px solid rgba(176,122,0,.25); }
    .champ-out    { background: var(--red-bg);  color: var(--red-txt); border: 1px solid rgba(204,0,0,.2); text-decoration: line-through; }
    .champ-win    { background: rgba(0,122,46,.10); color: var(--green); border: 1px solid rgba(0,122,46,.2); }
    .pbar { height: 5px; background: var(--card2); border-radius: 3px; width: 80px; display: inline-block; vertical-align: middle; }
    .pbar-fill { height: 100%; border-radius: 3px; background: var(--espn); }

    /* ── TABS ── */
    .tabs { display: flex; border-bottom: 2px solid var(--border); flex-wrap: wrap; }
    .tab-btn {
      padding: 9px 18px; border: none; background: none;
      color: var(--text2); cursor: pointer; font-size: 13px; font-weight: 600;
      border-bottom: 3px solid transparent; margin-bottom: -2px; transition: color .15s;
    }
    .tab-btn:hover { color: var(--text); }
    .tab-btn.active { color: var(--espn); border-bottom-color: var(--espn); }
    .tab-pane { display: none; padding-top: 14px; }
    .tab-pane.active { display: block; }

    /* ── PICKS TABLE ── */
    .picks-wrap { overflow-x: auto; border: 1px solid var(--border); border-radius: 4px; }
    .picks-table { width: 100%; border-collapse: collapse; background: var(--card); font-size: 11px; white-space: nowrap; }
    .picks-table thead { border-top: 2px solid var(--espn); }
    .picks-table th {
      background: var(--card2); padding: 7px 10px; font-size: 10px; color: var(--text2);
      text-align: center; border: 1px solid var(--border); font-weight: 700; letter-spacing: .3px;
      text-transform: uppercase;
    }
    .picks-table th.player-col { text-align: left; min-width: 90px; }
    .picks-table th.score-col  { text-align: right; background: rgba(204,0,0,.05); color: var(--espn) !important; }
    .picks-table td { padding: 7px 10px; text-align: center; border: 1px solid var(--border); }
    .picks-table td.player-col {
      text-align: left; background: var(--card2); font-weight: 700;
      position: sticky; left: 0; z-index: 2;
    }
    .picks-table td.score-col { text-align: right; font-weight: 800; background: rgba(204,0,0,.05); color: var(--espn); }
    .p-correct { background: var(--green-bg); color: var(--green-txt); font-weight: 600; }
    .p-wrong   { background: var(--red-bg);   color: var(--red-txt); text-decoration: line-through; }
    .p-cross   { background: var(--red-bg);   color: var(--red-txt); text-decoration: line-through; }
    .p-pending { color: var(--text2); }

    /* ── MISC ── */
    .legend { display: flex; gap: 14px; flex-wrap: wrap; font-size: 11px; color: var(--text2); margin-top: 8px; }
    .legend-item { display: flex; align-items: center; gap: 5px; }
    .ldot { width: 10px; height: 10px; border-radius: 2px; }
    .ldot-correct { background: var(--green-bg); border: 1px solid var(--green); }
    .ldot-wrong   { background: var(--red-bg);   border: 1px solid var(--espn); }
    .ldot-pending { background: transparent; border: 1px solid var(--border); }
    .progress-bar-wrap { display:flex; align-items:center; gap:6px; }

    @media(max-width:640px) {
      .header-logo { display: none; }
      .header-divider { display: none; }
    }

/* ================================================================
   SCORING ENGINE
================================================================ */
function calcScores(p) {
  const S32 = new Set(RESULTS.r32);
  const S16 = new Set(RESULTS.r16);
  const SQF = new Set(RESULTS.qf);

  const r32 = p.r32.reduce((n,t) => n + (S32.has(t) ? SCORING.r32 : 0), 0);
  const r16 = p.r16.reduce((n,t) => n + (S16.has(t) ? SCORING.r16 : 0), 0);
  const qf  = p.qf .reduce((n,t) => n + (SQF.has(t) ? SCORING.qf  : 0), 0);

  let fin = 0;
  const F = RESULTS.final;
  if (F.fourth   && p.final.fourth   === F.fourth)   fin += SCORING.final_4th;
  if (F.third    && p.final.third    === F.third)     fin += SCORING.final_3rd;
  if (F.second   && p.final.second   === F.second)    fin += SCORING.final_2nd;
  if (F.champion && p.final.champion === F.champion)  fin += SCORING.final_champion;

  return { gs: p.gs, r32, r16, qf, final: fin, total: p.gs + r32 + r16 + qf + fin };
}

/* ── สถานะทีมทายแชมป์ ── */
function champStatus(team) {
  const F = RESULTS.final;
  if (F.champion === team) return 'win';
  if (isEliminated(team)) return 'out';
  return 'alive';
}

/* ── ตรวจสอบว่าทีมตกรอบไปแล้วหรือยัง (ทุกรอบ รวมถึงตกรอบแบ่งกลุ่ม) ── */
function isEliminated(team) {
  // ทีมที่ไม่ผ่านรอบแบ่งกลุ่ม → ถือว่าตกไปแล้วทุกรอบ
  if (!GS_QUALIFIED.has(team)) return true;
  // ทีมที่ตกในรอบ knockout
  return RESULTS.r32_out.includes(team)
      || RESULTS.r16_out.includes(team)
      || RESULTS.qf_out.includes(team);
}

/* ── สีของ pick ── */
function pickColor(team, advSet, outSet) {
  if (advSet.has(team)) return 'p-correct';
  if (outSet.has(team)) return 'p-wrong';
  return 'p-pending';
}

/* ── จัดอันดับ ── */
function ranked() {
  const list = PLAYERS.map(p => ({ ...p, scores: calcScores(p) }));
  list.sort((a,b) => b.scores.total - a.scores.total);
  let rank = 1;
  for (let i = 0; i < list.length; i++) {
    if (i > 0 && list[i].scores.total < list[i-1].scores.total) rank = i + 1;
    list[i].rank = rank;
  }
  return list;
}

/* ── Build GS picks table ── */
function buildGSTable(players) {
  const n = players[0].gsPicks.length; // 32

  const colCounts = Array.from({length:n}, (_,i) => {
    const cnt = {};
    players.forEach(p => { const t = p.gsPicks[i]; cnt[t] = (cnt[t]||0) + 1; });
    const top = Object.entries(cnt).sort((a,b) => b[1]-a[1])[0];
    return top ? top[0] : '?';
  });

  const thead = `<thead><tr>
    <th class="player-col">ผู้เล่น</th>
    ${colCounts.map((lbl,i) => {
      const qualified = GS_QUALIFIED.has(lbl);
      return `<th title="Slot ${i+1}" style="${qualified?'color:var(--green)!important':''}">${i+1}<br/><small style="font-weight:400;font-size:9px">${lbl}</small></th>`;
    }).join('')}
    <th class="score-col">คะแนน<br/><small style="font-size:9px">GS</small></th>
  </tr></thead>`;

  const tbody = players.map(p => {
    const cells = p.gsPicks.map(team => {
      const cls = GS_QUALIFIED.has(team) ? 'p-correct' : 'p-wrong';
      return `<td class="${cls}">${team}</td>`;
    }).join('');
    return `<tr><td class="player-col">${p.name}</td>${cells}<td class="score-col">${p.scores.gs}</td></tr>`;
  }).join('');

  return `
    <div style="font-size:11px;margin-bottom:8px">
      <span style="color:var(--green);font-weight:600">✓ รอบแบ่งกลุ่มจบแล้ว — 32 ทีมผ่านเข้า R32</span>
    </div>
    <div class="picks-wrap">
      <table class="picks-table">${thead}<tbody>${tbody}</tbody></table>
    </div>
    <div class="legend" style="margin-top:8px">
      <div class="legend-item"><div class="ldot ldot-correct"></div> ผ่านเข้า R32 ✓ (+2 pts)</div>
      <div class="legend-item"><div class="ldot ldot-wrong"></div> ตกรอบแบ่งกลุ่ม ✗</div>
    </div>`;
}

/* ── Build picks table (r32 / r16 / qf) ── */
function buildPicksTable(players, round, maxTeams, pts) {
  const advSet = new Set(RESULTS[round]);
  const outSet = new Set(RESULTS[round + '_out']);
  const n = players[0][round].length;

  const colCounts = Array.from({length:n}, (_,i) => {
    const cnt = {};
    players.forEach(p => { const t = p[round][i]; cnt[t] = (cnt[t]||0) + 1; });
    const top = Object.entries(cnt).sort((a,b) => b[1]-a[1])[0];
    return top ? top[0] : '?';
  });

  const thead = `<thead><tr>
    <th class="player-col">ผู้เล่น</th>
    ${colCounts.map((lbl,i) => {
      const won = advSet.has(lbl);
      return `<th title="Slot ${i+1}" style="${won?'color:var(--green)!important':''}">${i+1}<br/><small style="font-weight:400;font-size:9px">${lbl}</small></th>`;
    }).join('')}
    <th class="score-col">คะแนน<br/><small style="font-size:9px">${pts}pt×</small></th>
  </tr></thead>`;

  const tbody = players.map(p => {
    let earned = 0;
    const cells = p[round].map(team => {
      const cls = pickColor(team, advSet, outSet);
      if (cls === 'p-correct') earned += pts;
      // Cross-round strikethrough: eliminated in an earlier round
      if (cls === 'p-pending' && isEliminated(team)) {
        return `<td class="p-cross">${team}</td>`;
      }
      return `<td class="${cls}">${team}</td>`;
    }).join('');
    return `<tr><td class="player-col">${p.name}</td>${cells}<td class="score-col">${earned}</td></tr>`;
  }).join('');

  const roundComplete = advSet.size === maxTeams;
  const statusLine = roundComplete
    ? `<span style="color:var(--green);font-weight:600">✓ รอบนี้จบแล้ว — ${maxTeams} ทีมผ่าน</span>`
    : `<span style="color:var(--text2)">ผ่านแล้ว ${advSet.size}/${maxTeams} ทีม · ตกรอบ ${outSet.size} ทีม</span>`;

  return `
    <div style="font-size:11px;margin-bottom:8px">${statusLine}</div>
    <div class="picks-wrap">
      <table class="picks-table">${thead}<tbody>${tbody}</tbody></table>
    </div>
    <div class="legend" style="margin-top:8px">
      <div class="legend-item"><div class="ldot ldot-correct"></div> ผ่านรอบ (+${pts} pts)</div>
      <div class="legend-item"><div class="ldot ldot-wrong"></div> ตกรอบ</div>
      <div class="legend-item"><div class="ldot ldot-pending"></div> รอผล</div>
      <div class="legend-item" style="color:var(--red-txt)"><s>ขีดทับ</s> = ตกรอบก่อนหน้าแล้ว</div>
    </div>`;
}

/* ── Build final table ── */
function buildFinalTable(players) {
  const keys = ['fourth','third','second','champion'];
  const labels = ['อันดับ 4','อันดับ 3','รองแชมป์','🏆 แชมป์'];
  const bonus  = [SCORING.final_4th, SCORING.final_3rd, SCORING.final_2nd, SCORING.final_champion];
  const F = RESULTS.final;

  const thead = `<thead><tr>
    <th class="player-col">ผู้เล่น</th>
    ${labels.map((lbl,i) => {
      const w = F[keys[i]];
      return `<th>${lbl}<br/><small style="font-weight:400;font-size:9px">${w?'✅ '+w:'รอผล'}</small><br/><small style="font-size:9px;color:var(--gold)">(+${bonus[i]}pt)</small></th>`;
    }).join('')}
    <th class="score-col">โบนัส</th>
  </tr></thead>`;

  const tbody = players.map(p => {
    let earned = 0;
    const cells = keys.map((k,i) => {
      const pick   = p.final[k] || '—';
      const winner = F[k];
      const dead   = isEliminated(pick);
      if (!winner) {
        // No result yet — show strikethrough if team already eliminated
        if (dead) return `<td class="p-cross">${pick}</td>`;
        return `<td class="p-pending">${pick}</td>`;
      }
      const ok = pick === winner;
      if (ok) earned += bonus[i];
      return `<td class="${ok?'p-correct':'p-wrong'}">${pick}</td>`;
    }).join('');
    return `<tr><td class="player-col">${p.name}</td>${cells}<td class="score-col">${earned}</td></tr>`;
  }).join('');

  return `<div class="picks-wrap"><table class="picks-table">${thead}<tbody>${tbody}</tbody></table></div>
  <div class="legend" style="margin-top:8px">
    <div class="legend-item"><div class="ldot ldot-correct"></div> ถูก</div>
    <div class="legend-item"><div class="ldot ldot-wrong"></div> ผิด</div>
    <div class="legend-item"><div class="ldot ldot-pending"></div> รอผล</div>
    <div class="legend-item" style="color:var(--red-txt)"><s>ขีดทับ</s> = ทีมตกรอบแล้ว</div>
  </div>`;
}

/* ── Tab switch ── */
function switchTab(id, btn) {
  document.querySelectorAll('.tab-pane').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('tab-'+id).classList.add('active');
  btn.classList.add('active');
}

render();
</script>
</body>
</html>
